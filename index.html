<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ambient viz</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #ui {
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
    background: rgba(0,0,0,0.4);
    padding: 10px 12px;
    border-radius: 8px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    transition: opacity 0.6s ease;
  }
  #ui-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #ui.faded { opacity: 0.15; }
  #ui:hover { opacity: 1; }
  #timeline-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #timeline-wrap.hidden { display: none; }
  #timeline {
    position: relative;
    flex: 1;
    height: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
  }
  #timeline-track {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #333;
    border-radius: 1px;
  }
  #timeline-fill {
    position: absolute;
    left: 0;
    height: 2px;
    background: #eee;
    border-radius: 1px;
    pointer-events: none;
  }
  #timeline-head {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #eee;
    transform: translate(-50%, 0);
    pointer-events: none;
  }
  #timeline:hover #timeline-head { width: 10px; height: 10px; }
  .time {
    color: #aaa;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    min-width: 36px;
    text-align: center;
  }
  button, label.filebtn {
    background: transparent;
    color: #eee;
    border: 1px solid #555;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    text-transform: lowercase;
  }
  button:hover, label.filebtn:hover { border-color: #eee; }
  button:disabled { opacity: 0.4; cursor: default; }
  input[type=file] { display: none; }
  #status { color: #888; margin-left: 8px; }
  #drophint {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: #444;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: lowercase;
  }
  #drophint.hidden { display: none; }
  #drop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.05);
    border: 2px dashed #888;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 5;
  }
  #drop-overlay.active { opacity: 1; }
  #dev-overlay {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 230px;
    background: rgba(0,0,0,0.78);
    border: 1px solid #444;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #ddd;
    z-index: 20;
    user-select: none;
  }
  #dev-overlay.hidden { display: none; }
  #dev-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px 5px 10px;
    background: rgba(255,255,255,0.05);
    cursor: move;
    border-bottom: 1px solid #333;
    text-transform: lowercase;
    letter-spacing: 0.05em;
    color: #aaa;
    touch-action: none;
  }
  #dev-close {
    background: transparent;
    border: none;
    color: #888;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
  }
  #dev-close:hover { color: #fff; }
  #dev-body { padding: 4px 10px; }
  .dev-section {
    padding: 4px 0;
    border-bottom: 1px solid #222;
  }
  .dev-section:last-child { border-bottom: none; }
  .dev-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 1px 0;
    font-variant-numeric: tabular-nums;
  }
  .dev-row .k { color: #777; flex: 0 0 auto; min-width: 80px; }
  .dev-row .v { color: #ddd; flex: 1; text-align: right; }
  .dev-swatch {
    width: 12px;
    height: 12px;
    border: 1px solid #555;
    border-radius: 2px;
    display: inline-block;
    flex: 0 0 auto;
  }
  .dev-slider {
    flex: 1;
    margin: 0 6px;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #333;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .dev-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    background: #ddd;
    border-radius: 50%;
    cursor: pointer;
  }
  .dev-slider::-moz-range-thumb {
    width: 10px;
    height: 10px;
    background: #ddd;
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }
  .dev-num {
    flex: 0 0 auto;
    min-width: 38px;
    text-align: right;
    color: #ddd;
    font-variant-numeric: tabular-nums;
  }
  .dev-thresh-val {
    text-align: center;
    color: #ddd;
    font-variant-numeric: tabular-nums;
    padding: 2px 0 4px;
    font-size: 11px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="drophint">drop an audio file or click play</div>
<div id="drop-overlay"></div>
<div id="ui">
  <div id="timeline-wrap" class="hidden">
    <span id="time-cur" class="time">0:00</span>
    <div id="timeline">
      <div id="timeline-track"></div>
      <div id="timeline-fill"></div>
      <div id="timeline-head"></div>
    </div>
    <span id="time-dur" class="time">0:00</span>
  </div>
  <div id="ui-row">
    <label class="filebtn" for="file">file</label>
    <input id="file" type="file" accept="audio/*" />
    <button id="mic">mic</button>
    <button id="playpause" disabled>play</button>
    <span id="status">no audio</span>
  </div>
</div>
<div id="dev-overlay">
  <div id="dev-header">
    <span>debug</span>
    <button id="dev-close" type="button" aria-label="close">×</button>
  </div>
  <div id="dev-body">
    <div class="dev-section">
      <div class="dev-row"><span class="k">tint</span><span class="dev-swatch" id="dev-tint-sw"></span><span class="v" id="dev-tint">0,0,0</span></div>
      <div class="dev-row"><span class="k">target</span><span class="dev-swatch" id="dev-target-sw"></span><span class="v" id="dev-target">— [0]</span></div>
      <div class="dev-row"><span class="k">kicks</span><span class="v" id="dev-kicks">0/0</span></div>
      <div class="dev-row"><span class="k">shape</span><span class="v" id="dev-shape">— 0/0</span></div>
    </div>
    <div class="dev-section">
      <div class="dev-row"><span class="k">bass</span><span class="v" id="dev-bass">0.00</span></div>
      <div class="dev-row"><span class="k">bassFast</span><span class="v" id="dev-bf">0.00</span></div>
      <div class="dev-row"><span class="k">mid</span><span class="v" id="dev-mid">0.00</span></div>
      <div class="dev-row"><span class="k">treble</span><span class="v" id="dev-treble">0.00</span></div>
      <div class="dev-row"><span class="k">level</span><span class="v" id="dev-level">0.00</span></div>
      <div class="dev-row"><span class="k">bassPulse</span><span class="v" id="dev-bp">0.00</span></div>
      <div class="dev-row"><span class="k">bassDev</span><span class="v" id="dev-bd">0.00</span></div>
      <div class="dev-row">
        <span class="k">kick thresh</span>
        <input type="range" id="dev-kthresh" class="dev-slider" min="0.005" max="0.25" step="0.005" value="0.07">
      </div>
      <div class="dev-thresh-val" id="dev-kthresh-val">0.070</div>
    </div>
    <div class="dev-section">
      <div class="dev-row"><span class="k">slices</span><span class="v" id="dev-slices">0</span></div>
      <div class="dev-row"><span class="k">bars inv/mono</span><span class="v" id="dev-bars">0/0</span></div>
      <div class="dev-row"><span class="k">slice angle</span><span class="v" id="dev-slice-ang">0°</span></div>
      <div class="dev-row"><span class="k">freeze</span><span class="v" id="dev-freeze">0</span></div>
    </div>
    <div class="dev-section">
      <div class="dev-row"><span class="k">fps</span><span class="v" id="dev-fps">--</span></div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('file');
  const micBtn = document.getElementById('mic');
  const playBtn = document.getElementById('playpause');
  const statusEl = document.getElementById('status');
  const dropHint = document.getElementById('drophint');
  const dropOverlay = document.getElementById('drop-overlay');
  const ui = document.getElementById('ui');
  const timelineWrap = document.getElementById('timeline-wrap');
  const timeline = document.getElementById('timeline');
  const timelineFill = document.getElementById('timeline-fill');
  const timelineHead = document.getElementById('timeline-head');
  const timeCur = document.getElementById('time-cur');
  const timeDur = document.getElementById('time-dur');

  function fmtTime(s) {
    if (!isFinite(s) || s < 0) s = 0;
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }
  function setTimelineProgress(frac) {
    frac = Math.max(0, Math.min(1, frac));
    const pct = frac * 100;
    timelineFill.style.width = pct + '%';
    timelineHead.style.left = pct + '%';
  }
  setTimelineProgress(0);

  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- audio graph ---
  let audioCtx = null;
  let analyser = null;
  let freqData = null;
  let timeData = null;
  // Parallel analyser with low smoothing — used only for transient (kick)
  // detection. The main `analyser` smooths heavily (0.85) for visual
  // stability, which flattens kick attacks below the slice trigger
  // threshold during sustained loud passages. This one preserves them.
  let transientAnalyser = null;
  let transientFreqData = null;
  let currentSource = null;     // MediaElementSource or MediaStreamSource
  let currentEl = null;         // HTMLAudioElement when in file mode
  let micStream = null;

  function ensureCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.85;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);
      transientAnalyser = audioCtx.createAnalyser();
      transientAnalyser.fftSize = 1024;          // smaller window = faster response
      transientAnalyser.smoothingTimeConstant = 0.3;
      transientFreqData = new Uint8Array(transientAnalyser.frequencyBinCount);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function teardownSource() {
    if (currentSource) { try { currentSource.disconnect(); } catch(e){} currentSource = null; }
    if (currentEl) { currentEl.pause(); currentEl.src = ''; currentEl = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    playBtn.disabled = true;
    playBtn.textContent = 'play';
    timelineWrap.classList.add('hidden');
    setTimelineProgress(0);
    timeCur.textContent = '0:00';
    timeDur.textContent = '0:00';
  }

  function loadFile(file) {
    ensureCtx();
    teardownSource();
    const url = URL.createObjectURL(file);
    const audio = new Audio();
    audio.src = url;
    audio.crossOrigin = 'anonymous';
    audio.loop = false;
    currentEl = audio;
    const src = audioCtx.createMediaElementSource(audio);
    src.connect(analyser);
    src.connect(transientAnalyser);
    analyser.connect(audioCtx.destination);
    currentSource = src;
    statusEl.textContent = file.name;
    playBtn.disabled = false;
    audio.addEventListener('play', () => playBtn.textContent = 'pause');
    audio.addEventListener('pause', () => playBtn.textContent = 'play');
    audio.addEventListener('ended', () => playBtn.textContent = 'play');
    audio.addEventListener('loadedmetadata', () => {
      timeDur.textContent = fmtTime(audio.duration);
      timelineWrap.classList.remove('hidden');
    });
    audio.addEventListener('timeupdate', () => {
      if (scrubbing) return;
      timeCur.textContent = fmtTime(audio.currentTime);
      const dur = audio.duration;
      if (isFinite(dur) && dur > 0) setTimelineProgress(audio.currentTime / dur);
    });
    audio.play().catch(() => {});
    dropHint.classList.add('hidden');
  }

  // --- timeline scrubbing ---
  let scrubbing = false;
  let wasPlayingBeforeScrub = false;

  function fracFromEvent(e) {
    const rect = timeline.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }
  function applyScrub(frac, commit) {
    if (!currentEl || !isFinite(currentEl.duration) || currentEl.duration <= 0) return;
    setTimelineProgress(frac);
    const t = frac * currentEl.duration;
    timeCur.textContent = fmtTime(t);
    if (commit) currentEl.currentTime = t;
  }
  timeline.addEventListener('pointerdown', e => {
    if (!currentEl) return;
    e.preventDefault();
    timeline.setPointerCapture(e.pointerId);
    scrubbing = true;
    wasPlayingBeforeScrub = !currentEl.paused;
    applyScrub(fracFromEvent(e), true);
  });
  timeline.addEventListener('pointermove', e => {
    if (!scrubbing) return;
    applyScrub(fracFromEvent(e), true);
  });
  function endScrub(e) {
    if (!scrubbing) return;
    scrubbing = false;
    try { timeline.releasePointerCapture(e.pointerId); } catch(_) {}
    if (wasPlayingBeforeScrub && currentEl && currentEl.paused) currentEl.play().catch(() => {});
  }
  timeline.addEventListener('pointerup', endScrub);
  timeline.addEventListener('pointercancel', endScrub);

  // arrow keys: seek ±5s, shift = ±15s
  window.addEventListener('keydown', e => {
    if (!currentEl) return;
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      const step = (e.shiftKey ? 15 : 5) * (e.key === 'ArrowRight' ? 1 : -1);
      currentEl.currentTime = Math.max(0, Math.min((currentEl.duration || 0), currentEl.currentTime + step));
    } else if (e.code === 'Space') {
      e.preventDefault();
      if (currentEl.paused) currentEl.play().catch(() => {});
      else currentEl.pause();
    }
  });

  async function startMic() {
    ensureCtx();
    teardownSource();
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      const src = audioCtx.createMediaStreamSource(micStream);
      src.connect(analyser);
      src.connect(transientAnalyser);
      // do NOT connect mic to destination — would feedback
      currentSource = src;
      statusEl.textContent = 'mic';
      playBtn.disabled = true;
      dropHint.classList.add('hidden');
    } catch (e) {
      statusEl.textContent = 'mic denied';
    }
  }

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) loadFile(f);
  });
  micBtn.addEventListener('click', startMic);
  playBtn.addEventListener('click', () => {
    if (!currentEl) return;
    if (currentEl.paused) currentEl.play();
    else currentEl.pause();
  });

  // drag & drop
  window.addEventListener('dragenter', e => { e.preventDefault(); dropOverlay.classList.add('active'); });
  window.addEventListener('dragover', e => { e.preventDefault(); });
  window.addEventListener('dragleave', e => {
    if (e.target === document.documentElement) dropOverlay.classList.remove('active');
  });
  window.addEventListener('drop', e => {
    e.preventDefault();
    dropOverlay.classList.remove('active');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('audio')) loadFile(f);
  });

  // fade UI when idle
  let idleTimer;
  function poke() {
    ui.classList.remove('faded');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => ui.classList.add('faded'), 2500);
  }
  window.addEventListener('mousemove', poke);
  poke();

  // --- audio band extraction ---
  // returns 0..1 averaged energies over coarse bands
  function bands() {
    if (!analyser) return { bass: 0, mid: 0, treble: 0, level: 0, bassFast: 0 };
    analyser.getByteFrequencyData(freqData);
    const n = freqData.length;
    // analyser bins map linearly to 0..nyquist; for 48k sample rate that's 0..24k, bin = index/n * nyquist
    const sr = audioCtx.sampleRate;
    const nyq = sr / 2;
    function avgRange(data, dataN, loHz, hiHz) {
      const lo = Math.max(0, Math.floor(loHz / nyq * dataN));
      const hi = Math.min(dataN, Math.ceil(hiHz / nyq * dataN));
      let s = 0, c = 0;
      for (let i = lo; i < hi; i++) { s += data[i]; c++; }
      return c ? s / c / 255 : 0;
    }
    const bass = avgRange(freqData, n, 20, 200);
    const mid = avgRange(freqData, n, 200, 2000);
    const treble = avgRange(freqData, n, 2000, 12000);
    let level = 0;
    for (let i = 0; i < n; i++) level += freqData[i];
    level = level / n / 255;
    let bassFast = 0;
    if (transientAnalyser) {
      transientAnalyser.getByteFrequencyData(transientFreqData);
      bassFast = avgRange(transientFreqData, transientFreqData.length, 20, 200);
    }
    return { bass, mid, treble, level, bassFast };
  }

  // --- car silhouette ---
  // Auto-generated from irocz.svg by preprocess.js. 47 subpaths of flattened
  // polylines, normalized so the longest axis spans [-0.5, 0.5]. The flyout
  // layer renders this with even-odd fill so the inner cutouts (windshield,
  // headlights, grille slots) read as holes.
  const CAR_ASPECT = 1.4755;
  const CAR_SUBPATHS = [
    [-0.2963,0.3389,-0.4688,0.3324,-0.4886,0.3189,-0.4932,0.3083,-0.4958,0.3032,-0.4996,0.2805,-0.4875,0.0143,-0.4827,0.0258,-0.4793,0.0465,-0.4759,0.0469,-0.4589,0.053,-0.4441,0.056,-0.4349,0.0563,-0.2669,0.0693,0.0885,0.0682,0.3704,0.0641,0.4171,0.0604,0.435,0.0541,0.4396,0.054,0.4455,0.0562,0.4779,0.038,0.4794,0.0411,0.4848,0.1498,0.4892,0.2858,0.4852,0.3091,0.4758,0.3232,0.4588,0.3329,0.4209,0.3377,-0.2963,0.3389],
    [-0.3476,0.2975,-0.3433,0.247,-0.3462,0.2566,-0.3526,0.3009,-0.3525,0.3056,-0.3476,0.2975],
    [0.3522,0.2901,0.348,0.2614,0.3441,0.246,0.3493,0.297,0.3532,0.3022,0.3522,0.2901],
    [-0.3078,0.2339,-0.3151,0.2291,-0.3213,0.2351,-0.314,0.2399,-0.3078,0.2339],
    [0.0143,0.2392,0.3263,0.2266,0.431,0.2215,0.4355,0.2239,0.4437,0.224,0.4422,0.1964,0.4406,0.1689,0.4477,0.1656,0.4532,0.1609,0.4484,0.1619,0.3124,0.1714,0.2206,0.1749,0.2146,0.1826,0.1995,0.196,0.126,0.2037,-0.1344,0.2037,-0.192,0.1988,-0.2141,0.1826,-0.2201,0.1749,-0.3106,0.1714,-0.4474,0.1623,-0.4518,0.1601,-0.4379,0.1677,-0.4292,0.1704,-0.4337,0.1733,-0.439,0.1709,-0.4402,0.1798,-0.4418,0.2067,-0.4437,0.224,-0.4352,0.2239,-0.4306,0.2214,-0.4229,0.2188,-0.2655,0.2315,-0.2328,0.2324,-0.2056,0.234,-0.1768,0.2348,-0.1416,0.2367,-0.1084,0.2386,-0.0737,0.2396,-0.0462,0.2406,0.0143,0.2392],
    [0.4285,0.1727,0.4324,0.1703,0.4362,0.1713,0.4324,0.1737,0.4285,0.1727],
    [0.3211,0.2367,0.3147,0.2316,0.3084,0.2353,0.3141,0.24,0.3205,0.2415,0.3211,0.2367],
    [0.3458,0.2335,0.3446,0.2367,0.3458,0.2399,0.3458,0.2335],
    [-0.359,0.229,-0.4011,0.2273,-0.4242,0.2275,-0.3999,0.2291,-0.3577,0.2307,-0.3398,0.2308],

  // --- particles / shapes ---
  // Two layers:
  //   "flyout": car silhouettes that fly toward the camera from a vanishing
  //             point, growing/rotating as they approach. Trail fade gives
  //             them ghost echoes.
  //   "spark":  short-lived particles spawned by transients (bass / treble).
  const flyout = [];
  const sparks = [];
  const FLYOUT_COUNT = 10;
  const Z_FAR = 2.0;                  // spawn z (deep background)
  const Z_NEAR = 0.04;                // z at which a shape passes the camera

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnFlyout(s) {
    s = s || {};
    // world offset from the vanishing point. Wide ranges so cars spawn
    // distributed across the viewport rather than clustered at the center;
    // off-center spawns will fly outward and leave the frame faster.
    s.wx = rand(-2.5, 2.5);
    s.wy = rand(-1.8, 1.8);
    s.z = Z_FAR;
    s.vz = rand(0.0006, 0.0024);      // approach speed
    s.size = rand(80, 280);           // longest-axis size in world units
    // rotation: each car settles to a random target angle in ±90°. The
    // displayed rotation is interpolated from 0 to rotTarget as the car
    // grows, reaching the target at 75% of size-progress and locking there.
    s.rotTarget = rand(-Math.PI / 2, Math.PI / 2);
    s.fillAlpha = rand(0.16, 0.42);   // per-shape fill density
    s.visThresh = rand(0, 0.15);      // overall energy needed for this shape to appear
    return s;
  }

  function initFlyout() {
    flyout.length = 0;
    for (let i = 0; i < FLYOUT_COUNT; i++) {
      const s = spawnFlyout();
      // stagger initial z so they don't all fly past at the same time
      s.z = rand(Z_NEAR + 0.05, Z_FAR);
      flyout.push(s);
    }
  }
  initFlyout();

  function spawnSpark(intensity, kind) {
    // kind: 'bass' big slow, 'treble' small fast
    const cx = W * 0.5, cy = H * 0.5;
    const count = kind === 'bass'

      : Math.floor(intensity * 14);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = kind === 'bass' ? rand(0.6, 2.2) * (0.6 + intensity) : rand(1.5, 4.5) * (0.6 + intensity);
      const r = kind === 'bass' ? rand(1.2, 3.2) : rand(0.4, 1.2);
      // origin: bass from center, treble from random points (shimmer)
      const ox = kind === 'bass' ? cx + rand(-40, 40) : Math.random() * W;
      const oy = kind === 'bass' ? cy + rand(-40, 40) : Math.random() * H;
      sparks.push({
        x: ox, y: oy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: kind === 'bass' ? rand(0.004, 0.010) : rand(0.012, 0.025),

        kind,

    }
  }

        pts[i * 2] = Math.cos(a);
        pts[i * 2 + 1] = Math.sin(a);
      }
    } else if (name === 'square') {
      // Walk perimeter starting at (1, 0), CCW, equal arc-length steps.
      // Perimeter length = 8; each of 24 steps covers 1/3 of unit length.
      for (let i = 0; i < SHAPE_N; i++) {
        const arc = (i / SHAPE_N) * 8;
        let x, y;
        if (arc <= 1)      { x = 1;            y = arc; }
        else if (arc <= 3) { x = 1 - (arc - 1); y = 1; }
        else if (arc <= 5) { x = -1;           y = 1 - (arc - 3); }
        else if (arc <= 7) { x = -1 + (arc - 5); y = -1; }
        else               { x = 1;            y = -1 + (arc - 7); }
        pts[i * 2] = x;
        pts[i * 2 + 1] = y;
      }

      const PEAKS = 6;
      for (let i = 0; i < SHAPE_N; i++) {
        const a = (i / SHAPE_N) * Math.PI * 2;
        const r = 0.5 + 0.5 * Math.cos(PEAKS * a);
        pts[i * 2] = r * Math.cos(a);
        pts[i * 2 + 1] = r * Math.sin(a);
      }

  const ROW_CORRUPT_AMOUNT = 2.6;     // px of row shift per unit of bassPulse (* rectW)
  const ONSET_THRESHOLD = 0.07;       // level deviation above running avg to trigger
  const ONSET_COOLDOWN_MIN = 12;      // frames between onset events
  const ONSET_COOLDOWN_MAX = 35;
  const MID_SLICE_TRIGGER = 0.09;     // mid-pulse threshold for additional tears
  const FLASH_TRIGGER = 0.18;         // bass rising-edge threshold for invert/strobe flash
  const FREEZE_FRAMES_MIN = 4;
  const FREEZE_FRAMES_MAX = 12;
  const DITHER_TILES_X = 8;           // dither pattern tile (Bayer 8x8)
  const DITHER_TILES_Y = 8;
  // Color overlay applied AFTER dither. The dithered image is pure B&W, so
  // multiplying by a saturated color tints whites to that color and leaves
  // blacks black. Slice bars then invert (`difference` with white) within
  // their footprint, flipping the tint toward its complement and black→white.
  //
  // The tint cycles through this palette over time. We have no BPM detector,
  // so we count bass leading-edge transients (the same `bassRise` trigger
  // that fires slices) as a beat proxy. 64 transients ≈ 32 bars in 4/4 with
  // a kick on 1 & 3; tracks with a four-on-the-floor pattern will cycle
  // about twice as fast. Per-frame lerp toward the target slowly crossfades
  // between palette entries (~5s to settle at COLOR_LERP=0.01).
  const COLOR_PALETTE = [
    [  0, 255,  65],  // matrix phosphor green
    [255,  40,  60],  // crimson red
    [180,  30, 255],  // electric purple
    [ 60, 110, 255],  // electric blue
    [255, 255, 255],  // white = identity under multiply = no tint (pure B&W)
  ];
  const KICKS_PER_COLOR_CYCLE = 64;
  const COLOR_LERP = 0.01;            // per-dt lerp toward target tint

  // pre-allocated noise canvas + image for grain overlay
  const noiseCanvas = document.createElement('canvas');
  noiseCanvas.width = GRAIN_RES;
  noiseCanvas.height = GRAIN_RES;
  const noiseCtx = noiseCanvas.getContext('2d');
  const noiseImg = noiseCtx.createImageData(GRAIN_RES, GRAIN_RES);

  function regenNoise(density) {
    // sparse bright pixels on black — phosphor-static look. density 0..1.
    const data = noiseImg.data;
    const thresh = 0.04 + density * 0.20;
    for (let i = 0; i < data.length; i += 4) {
      let v = 0;
      if (Math.random() < thresh) v = 160 + Math.floor(Math.random() * 95);
      data[i] = data[i + 1] = data[i + 2] = v;
      data[i + 3] = 255;
    }
    noiseCtx.putImageData(noiseImg, 0, 0);
  }

  const slices = [];
  // Per-frame log of slice destination rects (CSS px + rotation about screen
  // center). Populated as slices render; consumed by the post-dither overlay
  // pass. Inversion bars flip the tint to its complement within their
  // footprint; mono bars instead repaint the pre-tint B&W there, punching a
  // colorless slot through the tinted field.
  const inversionRegions = [];
  const monoRegions = [];
  // Slice orientation drifts clockwise. Holds for a few beats (counted by bass
  // onsets), then advances by a random 20–45° step. New slices are spawned at
  // the current orientation so a burst all reads as the same diagonal cut.
  let currentSliceAngle = 0;
  let beatsAtOrientation = 0;
  let nextRotateBeats = 3 + Math.floor(Math.random() * 6); // 3–8 beats

  function spawnSliceBurst(intensity) {
    const count = SLICE_BURST_MIN + Math.floor(Math.random() * (SLICE_BURST_MAX - SLICE_BURST_MIN + 1));
    for (let i = 0; i < count; i++) {
      slices.push({
        y: Math.random() * H,
        h: 6 + Math.random() * 110,
        dx: (Math.random() - 0.5) * W * (0.20 + intensity * 0.55),
        life: 5 + Math.floor(Math.random() * 16), // 5-20 frames
        angle: currentSliceAngle + (Math.random() * 2 - 1) * SLICE_ANGLE_JITTER,
        mono: Math.random() < MONO_BAR_CHANCE,
      });
    }
  }

  // --- 1-bit Bayer dither ---
  // Standard 8x8 ordered dither matrix, values 0..63.
  const BAYER8 = new Uint8Array([
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21,
  ]);

  // Dither runs at CSS resolution (not device res) for speed and chunkier
  // pixel-art look. Result is then nearest-neighbor scaled back to the main
  // canvas so dither cells appear ~dpr device-pixels wide.
  const ditherCanvas = document.createElement('canvas');
  const ditherCtx = ditherCanvas.getContext('2d');
  function resizeDither() {
    ditherCanvas.width = Math.max(1, Math.ceil(W));
    ditherCanvas.height = Math.max(1, Math.ceil(H));
  }
  resizeDither();
  window.addEventListener('resize', resizeDither);

  function applyDither(offX, offY) {
    const dw = ditherCanvas.width;
    const dh = ditherCanvas.height;
    if (dw <= 0 || dh <= 0) return;
    // downsample current frame onto the dither canvas
    ditherCtx.imageSmoothingEnabled = true;
    ditherCtx.drawImage(canvas, 0, 0, dw, dh);
    const img = ditherCtx.getImageData(0, 0, dw, dh);
    const data = img.data;
    const data32 = new Uint32Array(data.buffer);
    const ox = offX & 7, oy = offY & 7;
    for (let y = 0; y < dh; y++) {
      const by = ((y + oy) & 7) << 3;
      for (let x = 0; x < dw; x++) {
        const idx = y * dw + x;
        const lum = data[idx << 2]; // R channel; content is grayscale
        const t = (BAYER8[by + ((x + ox) & 7)] << 2) + 2; // 2..254
        data32[idx] = lum > t ? 0xFFFFFFFF : 0xFF000000;
      }
    }
    ditherCtx.putImageData(img, 0, 0);
    // copy back nearest-neighbor at full canvas resolution
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(ditherCanvas, 0, 0, dw, dh, 0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  // --- frame freeze ---
  // capture a snapshot of the current canvas into an offscreen backing canvas;
  // replay it for several frames so underlying content "sticks" while overlays
  // (grain, dither) keep animating. drawImage is GPU-accelerated, much faster
  // than getImageData/putImageData.
  const freezeCanvas = document.createElement('canvas');
  const freezeCtx = freezeCanvas.getContext('2d');
  function resizeFreeze() {
    freezeCanvas.width = canvas.width;
    freezeCanvas.height = canvas.height;
  }
  resizeFreeze();
  window.addEventListener('resize', resizeFreeze);
  let freezeFrames = 0;
  // 1/8 of freezes drop the color overlay for their duration — the world
  // briefly returns to pure B&W, which lands as a quiet exhale against the
  // tinted majority of the visual.
  let freezeMono = false;
  const FREEZE_MONO_CHANCE = 1 / 8;
  function captureFreeze() {
    freezeCtx.clearRect(0, 0, freezeCanvas.width, freezeCanvas.height);
    freezeCtx.drawImage(canvas, 0, 0);
    const base = FREEZE_FRAMES_MIN +
      Math.floor(Math.random() * (FREEZE_FRAMES_MAX - FREEZE_FRAMES_MIN + 1));
    // each freeze randomly lasts 1x or 2x the base duration
    freezeFrames = base * (Math.random() < 0.5 ? 1 : 2);
    freezeMono = Math.random() < FREEZE_MONO_CHANCE;
  }
  function restoreFreeze() {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(freezeCanvas, 0, 0);
    ctx.restore();
  }

  // --- block shuffle ---
  // chunk the canvas into a tile grid; randomly copy some tiles over others.
  // Single-frame application; trail fade absorbs it over the next few frames.
  function applyBlockShuffle() {
    const tilesX = 5 + Math.floor(Math.random() * 6);  // 5..10
    const tilesY = 3 + Math.floor(Math.random() * 5);  // 3..7
    const tileW = (canvas.width) / tilesX;
    const tileH = (canvas.height) / tilesY;
    const count = 4 + Math.floor(Math.random() * 6);   // 4..9 swaps
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'source-over';
    for (let i = 0; i < count; i++) {
      const ax = Math.floor(Math.random() * tilesX);
      const ay = Math.floor(Math.random() * tilesY);
      const bx = Math.floor(Math.random() * tilesX);
      const by = Math.floor(Math.random() * tilesY);
      ctx.drawImage(canvas,
        ax * tileW, ay * tileH, tileW, tileH,
        bx * tileW, by * tileH, tileW, tileH);
    }
    ctx.restore();
  }

  function pushFilledRectPoints(out, cx, cy, width, height, spacing, rowCorrupt) {
    const halfW = width / 2;
    const halfH = height / 2;
    const rowH = spacing * Math.sqrt(3) / 2;
    const rows = Math.floor(height / rowH);
    const yStart = -rows * rowH / 2;
    const corrupt = rowCorrupt || 0;
    for (let r = 0; r <= rows; r++) {
      const ly = yStart + r * rowH;
      if (ly < -halfH || ly > halfH) continue;
      const xOffset = (r & 1) ? spacing / 2 : 0;
      const cols = Math.floor((width - xOffset * 2) / spacing);
      const xStart = -cols * spacing / 2;
      // per-row horizontal shift — drives bass-triggered lattice corruption
      const rowShift = corrupt > 0 ? (Math.random() - 0.5) * corrupt : 0;
      for (let c = 0; c <= cols; c++) {
        const lx = xStart + c * spacing + rowShift;
        // looser bounds during corruption so rows can spill past the rectangle
        if (lx < -halfW * 1.6 || lx > halfW * 1.6) continue;
        out.push(cx + lx, cy + ly);
      }
    }
  }

  // --- render loop ---
  let last = performance.now();
  let smoothLevel = 0;
  let smoothBass = 0;
  let smoothMid = 0;
  let smoothTreble = 0;
  // bass amplitude envelope: peak-follower over a power-shaped bass signal.
  // Tracks absolute loudness (silent kick = tiny pulse, thumping kick = huge
  // pulse), with fast release so each kick clearly cycles down between hits.
  // Discrete events (slices, flashes) use the rising-edge derivative below.
  let bassPulse = 0;
  let prevBass = 0;
  let bassBaseline = 0;
  let sliceCool = 0;
  // mid-band envelope (independent slice trigger stream)
  let midBaseline = 0;
  let midPulse = 0;
  let prevMid = 0;
  let midSliceCool = 0;
  // overall-energy onset detection (drives freeze + block shuffle)
  let energyAvg = 0;
  let prevLevel = 0;
  let onsetCool = 0;
  // single-frame flash (invert or strobe) on big bass pulses
  let flashCool = 0;
  let pendingFlash = null;            // null | 'invert' | 'strobe'
  let pendingFreeze = false;
  let pendingShuffle = false;
  // dither pattern phase shifts continuously, faster on treble
  let ditherPhaseX = 0;
  let ditherPhaseY = 0;
  // active color tint — lerped toward COLOR_PALETTE[colorIndex] each frame.
  // colorIndex advances every KICKS_PER_COLOR_CYCLE bass transients.
  let colorIndex = 0;
  let kickCount = 0;
  let tintR = COLOR_PALETTE[0][0];
  let tintG = COLOR_PALETTE[0][1];
  let tintB = COLOR_PALETTE[0][2];

  // --- dev overlay (draggable debug panel) ---
  // 'd' toggles. Header is the drag handle; close button hides. The overlay
  // reads visualizer state at end-of-frame so counters reflect the current
  // frame's slice render rather than the previous one.
  const devOverlay = document.getElementById('dev-overlay');
  const devHeader = document.getElementById('dev-header');
  const devClose = document.getElementById('dev-close');
  const devKThresh = document.getElementById('dev-kthresh');
  const devKThreshVal = document.getElementById('dev-kthresh-val');
  devKThresh.value = SLICE_TRIGGER;
  devKThreshVal.textContent = SLICE_TRIGGER.toFixed(3);
  devKThresh.addEventListener('input', () => {
    SLICE_TRIGGER = parseFloat(devKThresh.value);
    devKThreshVal.textContent = SLICE_TRIGGER.toFixed(3);
  });
  const devEls = {
    tint: document.getElementById('dev-tint'),
    tintSw: document.getElementById('dev-tint-sw'),
    target: document.getElementById('dev-target'),
    targetSw: document.getElementById('dev-target-sw'),
    kicks: document.getElementById('dev-kicks'),
    shape: document.getElementById('dev-shape'),
    bass: document.getElementById('dev-bass'),
    bf: document.getElementById('dev-bf'),
    mid: document.getElementById('dev-mid'),
    treble: document.getElementById('dev-treble'),
    level: document.getElementById('dev-level'),
    bp: document.getElementById('dev-bp'),
    bd: document.getElementById('dev-bd'),
    slices: document.getElementById('dev-slices'),
    bars: document.getElementById('dev-bars'),
    sliceAng: document.getElementById('dev-slice-ang'),
    freeze: document.getElementById('dev-freeze'),
    fps: document.getElementById('dev-fps'),
  };
  const PALETTE_NAMES = ['green', 'red', 'purple', 'blue', 'b&w'];

  let devDrag = null;
  devHeader.addEventListener('pointerdown', e => {
    if (e.target === devClose) return; // let the close button handle clicks
    e.preventDefault();
    const rect = devOverlay.getBoundingClientRect();
    devDrag = { offX: e.clientX - rect.left, offY: e.clientY - rect.top, pid: e.pointerId };
    try { devHeader.setPointerCapture(e.pointerId); } catch(_){}
  });
  devHeader.addEventListener('pointermove', e => {
    if (!devDrag || devDrag.pid !== e.pointerId) return;
    const x = e.clientX - devDrag.offX;
    const y = e.clientY - devDrag.offY;
    devOverlay.style.left = Math.max(0, Math.min(window.innerWidth - 40, x)) + 'px';
    devOverlay.style.top = Math.max(0, Math.min(window.innerHeight - 24, y)) + 'px';
    devOverlay.style.right = 'auto';
  });
  function endDevDrag(e) {
    if (!devDrag || devDrag.pid !== e.pointerId) return;
    try { devHeader.releasePointerCapture(e.pointerId); } catch(_){}
    devDrag = null;
  }
  devHeader.addEventListener('pointerup', endDevDrag);
  devHeader.addEventListener('pointercancel', endDevDrag);
  devClose.addEventListener('click', () => devOverlay.classList.add('hidden'));
  window.addEventListener('keydown', e => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.key === 'd' || e.key === 'D') devOverlay.classList.toggle('hidden');
  });

  // FPS: averaged over a ~500ms window so the readout doesn't flicker
  let fpsAccumStart = performance.now();
  let fpsAccumCount = 0;
  let fpsValue = 0;

  function updateDebug(b, bassDev) {
    if (devOverlay.classList.contains('hidden')) return;
    const r = tintR | 0, g = tintG | 0, bl = tintB | 0;
    devEls.tintSw.style.background = `rgb(${r},${g},${bl})`;
    devEls.tint.textContent = `${r},${g},${bl}`;
    const tgt = COLOR_PALETTE[colorIndex];
    devEls.targetSw.style.background = `rgb(${tgt[0]},${tgt[1]},${tgt[2]})`;
    devEls.target.textContent = `${PALETTE_NAMES[colorIndex] || '?'} [${colorIndex}]`;
    devEls.kicks.textContent = `${kickCount}/${KICKS_PER_COLOR_CYCLE}`;
    const inShape = Math.round(shapeProgress * KICKS_PER_SHAPE_CYCLE);
    devEls.shape.textContent =
      `${SHAPE_NAMES[shapeIndex]}→${SHAPE_NAMES[(shapeIndex + 1) % SHAPE_NAMES.length]} ${inShape}/${KICKS_PER_SHAPE_CYCLE}`;
    devEls.bass.textContent = b.bass.toFixed(2);
    devEls.bf.textContent = b.bassFast.toFixed(2);
    devEls.mid.textContent = b.mid.toFixed(2);
    devEls.treble.textContent = b.treble.toFixed(2);
    devEls.level.textContent = b.level.toFixed(2);
    devEls.bp.textContent = bassPulse.toFixed(2);
    devEls.bd.textContent = bassDev.toFixed(2);
    devEls.slices.textContent = slices.length;
    devEls.bars.textContent = `${inversionRegions.length}/${monoRegions.length}`;
    devEls.sliceAng.textContent = ((currentSliceAngle * 180 / Math.PI) | 0) + '°';
    devEls.freeze.textContent = freezeFrames > 0
      ? freezeFrames.toFixed(1) + (freezeMono ? ' mono' : '')
      : '0';
    devEls.fps.textContent = fpsValue.toFixed(0);
  }

  function frame(now) {
    const dt = Math.min(50, now - last) / 16.67; // normalize to ~60fps units
    last = now;
    inversionRegions.length = 0;
    monoRegions.length = 0;
    fpsAccumCount++;
    if (now - fpsAccumStart >= 500) {
      fpsValue = fpsAccumCount * 1000 / (now - fpsAccumStart);
      fpsAccumStart = now;
      fpsAccumCount = 0;
    }

    const b = bands();
    smoothLevel += (b.level - smoothLevel) * 0.08;
    smoothBass += (b.bass - smoothBass) * 0.15;
    smoothMid += (b.mid - smoothMid) * 0.20;
    smoothTreble += (b.treble - smoothTreble) * 0.30;

    // crossfade the active tint toward the current palette entry
    const tintTarget = COLOR_PALETTE[colorIndex];
    const tintLerp = Math.min(1, COLOR_LERP * dt);
    tintR += (tintTarget[0] - tintR) * tintLerp;
    tintG += (tintTarget[1] - tintG) * tintLerp;
    tintB += (tintTarget[2] - tintB) * tintLerp;

    // Kick detection runs on the parallel low-smoothing analyser (bassFast)
    // rather than on the heavily-smoothed b.bass — the main analyser's 0.85
    // smoothing flattens kick attacks below threshold during sustained loud
    // passages. The fast signal preserves per-kick spikes so both rising
    // edge and deviation-from-baseline behave as expected.
    const bassRise = Math.max(0, b.bassFast - prevBass);
    prevBass = b.bassFast;
    bassBaseline = bassBaseline * 0.97 + b.bassFast * 0.03;
    const bassDev = Math.max(0, b.bassFast - bassBaseline);

    // bassPulse: peak follower over a hard-kneed bass curve. Bass below 0.5
    // contributes nothing — the lattice stays at baseline. Above 0.5 the
    // signal ramps quadratically and only reaches 1.0 (max pulse) when bass
    // is truly thumping. Instant attack + fast release lets each kick spike
    // up and cleanly decay between hits.
    const bassAmp = Math.pow(Math.max(0, (b.bass - 0.5) * 2), 2);
    bassPulse = Math.max(bassAmp, bassPulse * Math.pow(0.88, dt));

    // bass-triggered slice tears — fire on either rising edge OR deviation
    // from the slow baseline (whichever is larger). Each bass beat also
    // counts toward the slice-orientation rotation timer and the color cycle.
    sliceCool = Math.max(0, sliceCool - dt);
    const bassOnset = Math.max(bassRise, bassDev);
    if (bassOnset > SLICE_TRIGGER && sliceCool <= 0) {
      kickCount++;
      if (kickCount >= KICKS_PER_COLOR_CYCLE) {
        colorIndex = (colorIndex + 1) % COLOR_PALETTE.length;
        kickCount = 0;
      }
      shapeProgress += 1 / KICKS_PER_SHAPE_CYCLE;
      if (shapeProgress >= 1) {
        shapeIndex = (shapeIndex + 1) % SHAPES.length;
        shapeProgress = 0;
      }
      beatsAtOrientation++;
      if (beatsAtOrientation >= nextRotateBeats) {
        const rotRad = (20 + Math.random() * 25) * Math.PI / 180; // 20–45° CW
        currentSliceAngle = (currentSliceAngle + rotRad) % (Math.PI * 2);
        beatsAtOrientation = 0;
        nextRotateBeats = 3 + Math.floor(Math.random() * 6);
      }
      spawnSliceBurst(Math.min(1, bassOnset * 4));
      sliceCool = 3 + Math.random() * 6;
    }

    // mid-band envelope — same derivative + baseline scheme as bass
    midBaseline = midBaseline * 0.97 + b.mid * 0.03;
    const midDev = Math.max(0, b.mid - midBaseline);
    const midRise = Math.max(0, b.mid - prevMid);
    prevMid = b.mid;
    const midTrigger = Math.max(midDev, midRise * 2.0);
    midPulse = Math.max(midTrigger, midPulse * Math.pow(0.91, dt));

    // mid-triggered slice tears (independent stream — adds chaos density)
    midSliceCool = Math.max(0, midSliceCool - dt);
    if (midPulse > MID_SLICE_TRIGGER && midSliceCool <= 0) {
      spawnSliceBurst(Math.min(1, midPulse * 1.6));
      midSliceCool = 4 + Math.random() * 7;
    }

    // single-frame flash on very strong bass onsets (50/50 invert vs strobe)
    flashCool = Math.max(0, flashCool - dt);
    if (bassRise > FLASH_TRIGGER && flashCool <= 0) {
      pendingFlash = Math.random() < 0.5 ? 'invert' : 'strobe';
      flashCool = 14 + Math.random() * 28;
    }

    // energy onset detection — combines fast baseline deviation and rising
    // edge so repeated transients keep firing instead of decaying out.
    // freeze and shuffle now fire independently so they can both hit at once.
    energyAvg = energyAvg * 0.95 + b.level * 0.05;
    const levelRise = Math.max(0, b.level - prevLevel);
    prevLevel = b.level;
    onsetCool = Math.max(0, onsetCool - dt);
    const onsetSig = Math.max(b.level - energyAvg, levelRise * 1.8);
    if (onsetSig > ONSET_THRESHOLD && onsetCool <= 0) {
      if (Math.random() < 0.55) pendingFreeze = true;
      if (Math.random() < 0.55) pendingShuffle = true;
      // guarantee at least one
      if (!pendingFreeze && !pendingShuffle) {
        if (Math.random() < 0.5) pendingFreeze = true;
        else pendingShuffle = true;
      }
      onsetCool = ONSET_COOLDOWN_MIN +
        Math.random() * (ONSET_COOLDOWN_MAX - ONSET_COOLDOWN_MIN);
    }

    // dither pattern phase — drifts slowly, accelerates hard on treble
    ditherPhaseX += dt * (0.35 + smoothTreble * 8.0);
    ditherPhaseY += dt * (0.25 + smoothTreble * 5.5);

    // moving averages
    bassAvg = bassAvg * 0.96 + b.bass * 0.04;
    trebleAvg = trebleAvg * 0.95 + b.treble * 0.05;
    bassCool = Math.max(0, bassCool - dt);
    trebleCool = Math.max(0, trebleCool - dt);

    if (b.bass > bassAvg * 1.35 + 0.05 && bassCool <= 0) {
      spawnSpark(Math.min(1, b.bass), 'bass');
      bassCool = 6;
    }
    if (b.treble > trebleAvg * 1.4 + 0.04 && trebleCool <= 0) {
      spawnSpark(Math.min(1, b.treble), 'treble');
      trebleCool = 4;
    }

    if (freezeFrames > 0) {
      // ---- frame freeze branch: replay captured snapshot ----
      restoreFreeze();
      freezeFrames -= dt;
    } else {
      // ---- normal render branch ----
    // motion-blur trail: paint translucent black over the canvas
    // lighter alpha = longer trails. tie slightly to level so loud passages crisp up.
    const fade = 0.06 + 0.05 * (1 - smoothLevel);
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, W, H);

    // additive white drawing
    ctx.globalCompositeOperation = 'lighter';

    // flyout shapes — rectangles approaching the viewer from a center
    // vanishing point. Mid energy speeds up approach + rotation.
    // The frame's trail-fade pass gives each shape a ghost echo each frame.
    const cx = W * 0.5, cy = H * 0.5;
    const flyAxis = Math.min(W, H) * 0.5;
    const speedScale = 1 + smoothMid * 5;
    // size-progress is linear in apparent-size (1/z) over the spawn→despawn
    // range; rotation reaches its target at 75% of this progress.
    const minSc = 1 / Z_FAR;
    const maxSc = 1 / Z_NEAR;
    const scRange = maxSc - minSc;
    for (let i = 0; i < flyout.length; i++) {
      const s = flyout[i];
      s.z -= s.vz * dt * speedScale;
      if (s.z <= Z_NEAR) {
        spawnFlyout(s);
        continue;
      }
      const sc = 1 / s.z;
      const sx = cx + s.wx * flyAxis * sc;
      const sy = cy + s.wy * flyAxis * sc;
      // bass throb — scale silhouette outward with bassPulse
      const sizeBoost = 1 + bassPulse * 0.45;
      const drawScale = s.size * sc * sizeBoost;
      // rotation: lerp 0 → rotTarget over 0..75% of size progress, lock after
      const sizeProgress = (sc - minSc) / scRange;
      const rotProgress = Math.min(1, sizeProgress / 0.75);
      const rot = s.rotTarget * rotProgress;

      // alpha curve: emerge from the void, peak at mid depth, fade as it passes
      let a;
      if (s.z > Z_FAR * 0.65) {
        a = (Z_FAR - s.z) / (Z_FAR * 0.35);
      } else if (s.z < 0.18) {
        a = s.z / 0.18;
      } else {
        a = 1;
      }
      a = Math.max(0, Math.min(1, a)) * 0.7;

      // energy gating: each shape has a per-shape level threshold and ramps
      // linearly from 0 at threshold to full at threshold+~0.17. At very low
      // levels the always-visible shapes (thresh=0) are also faint because
      // their above-threshold value is tiny.
      const above = Math.max(0, smoothLevel - s.visThresh);
      const energyMult = Math.min(1, above * 6);
      if (energyMult < 0.01) continue;
      a *= energyMult;
      // bass throb — brighten alpha on each kick so shapes pulse with bass
      a = Math.min(1, a * (1 + bassPulse * 0.7));

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(rot);
      // build the silhouette path at the current draw scale. Done inline
      // (rather than ctx.scale) so stroke widths stay in pixel units.
      ctx.beginPath();
      for (let k = 0; k < CAR_SUBPATHS.length; k++) {
        const sub = CAR_SUBPATHS[k];
        for (let j = 0; j < sub.length; j += 2) {
          const px = sub[j] * drawScale;
          const py = sub[j + 1] * drawScale;
          if (j === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
      }
      // translucent fill — dither will stipple it into a density pattern.
      // even-odd makes inner subpaths render as holes (windshield, grille).
      ctx.fillStyle = `rgba(255,255,255,${a * s.fillAlpha})`;
      ctx.fill('evenodd');
      // outer glow stroke (wider, dimmer) + crisp inner stroke
      ctx.strokeStyle = `rgba(255,255,255,${a * 0.35})`;
      ctx.lineWidth = Math.max(2, 2.4 + sc * 1.2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${a * 0.95})`;
      ctx.lineWidth = Math.max(1, 1 + sc * 0.3);
      ctx.stroke();
      ctx.restore();
    }

    // sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= s.kind === 'bass' ? 0.985 : 0.97;
      s.vy *= s.kind === 'bass' ? 0.985 : 0.97;
      s.life -= s.decay * dt;
      if (s.life <= 0 || s.x < -20 || s.x > W + 20 || s.y < -20 || s.y > H + 20) {
        sparks.splice(i, 1);
        continue;
      }
      const a = Math.max(0, s.life);
      const radius = s.r * (s.kind === 'bass' ? 1 + (1 - s.life) * 0.4 : 1);
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, radius * 5);
      g.addColorStop(0, `rgba(255,255,255,${0.9 * a})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(s.x, s.y, radius * 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // viewport-filling hex-lattice of particles.
    // particle radius pulses with the bass-transient envelope.
    // each particle is jittered per-frame by treble (high-freq shimmer);
    // each row is also shifted by an amount driven by the bass-pulse envelope
    // (lattice corruption on bass hits).
    const rectW = W;
    const rectH = H;
    const pulseR = PARTICLE_BASE_R + bassPulse * PARTICLE_PULSE_AMOUNT;
    const jitter = JITTER_PX * smoothTreble;
    const rowCorrupt = bassPulse * rectW * ROW_CORRUPT_AMOUNT;
    const pts = [];
    pushFilledRectPoints(pts, W * 0.5, H * 0.5, rectW, rectH, LATTICE_SPACING, rowCorrupt);
    // Lerp current shape pair into shapeBuffer once per frame, scaled by pulseR.
    const sFrom = SHAPES[shapeIndex];
    const sTo = SHAPES[(shapeIndex + 1) % SHAPES.length];
    const morph = shapeProgress;
    for (let k = 0; k < SHAPE_N * 2; k++) {
      shapeBuffer[k] = (sFrom[k] + (sTo[k] - sFrom[k]) * morph) * pulseR;
    }
    // Stamp the morphed shape once into the offscreen tile.
    particleCtx.clearRect(0, 0, PARTICLE_TILE, PARTICLE_TILE);
    particleCtx.fillStyle = 'rgba(255,255,255,0.95)';
    particleCtx.beginPath();
    particleCtx.moveTo(PARTICLE_HALF + shapeBuffer[0], PARTICLE_HALF + shapeBuffer[1]);
    for (let k = 2; k < SHAPE_N * 2; k += 2) {
      particleCtx.lineTo(PARTICLE_HALF + shapeBuffer[k], PARTICLE_HALF + shapeBuffer[k + 1]);
    }
    particleCtx.closePath();
    particleCtx.fill();
    // Stamp it at every lattice point. drawImage of a small bitmap is far
    // cheaper than path-emitting per particle.
    for (let i = 0; i < pts.length; i += 2) {
      const x = pts[i] + (Math.random() - 0.5) * jitter - PARTICLE_HALF;
      const y = pts[i + 1] + (Math.random() - 0.5) * jitter - PARTICLE_HALF;
      ctx.drawImage(particleCanvas, x, y);
    }

    // --- slice tears: copy horizontal bands of the canvas to shifted x,
    // additive composite for ghost-double-image. operate in device pixels.
    // Each slice carries its own angle (rotated about the canvas center)
    // so a burst can read as a diagonal tear instead of horizontal.
    if (slices.length) {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = 'lighter';
      const cxd = canvas.width / 2;
      const cyd = canvas.height / 2;
      for (let i = slices.length - 1; i >= 0; i--) {
        const s = slices[i];
        s.life -= dt;
        if (s.life <= 0) { slices.splice(i, 1); continue; }
        const sy = Math.max(0, Math.min(H - 1, s.y)) * dpr;
        const sh = Math.max(1, Math.min(H * dpr - sy, s.h * dpr));
        const region = {
          x: s.dx,
          y: sy / dpr,
          w: W,
          h: sh / dpr,
          angle: s.angle || 0,
        };
        (s.mono ? monoRegions : inversionRegions).push(region);
        if (s.angle) {
          ctx.save();
          ctx.translate(cxd, cyd);
          ctx.rotate(s.angle);
          ctx.translate(-cxd, -cyd);
          ctx.drawImage(canvas, 0, sy, W * dpr, sh, s.dx * dpr, sy, W * dpr, sh);
          ctx.restore();
        } else {
          ctx.drawImage(canvas, 0, sy, W * dpr, sh, s.dx * dpr, sy, W * dpr, sh);
        }
      }
      ctx.restore();
    }

    // capture-for-freeze happens BEFORE overlays so they keep animating
    // while content is paused
    if (pendingFreeze) {
      captureFreeze();
      pendingFreeze = false;
    }
    // block shuffle is a one-shot effect on the rendered scene
    if (pendingShuffle) {
      applyBlockShuffle();
      pendingShuffle = false;
    }
    } // end normal render branch

    // --- scanlines: dark rows every SCANLINE_PERIOD CSS px
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(0,0,0,${SCANLINE_ALPHA})`;
    for (let y = 0; y < H; y += SCANLINE_PERIOD) {
      ctx.fillRect(0, y, W, 1);
    }

    // --- film grain / TV snow: regenerated every frame, additive overlay.
    // density rises with treble for shimmery hi-hat fizz.
    regenNoise(0.25 + smoothTreble * 0.45);
    ctx.globalCompositeOperation = 'lighter';
    ctx.imageSmoothingEnabled = false;
    ctx.globalAlpha = GRAIN_ALPHA;
    ctx.drawImage(noiseCanvas, 0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.imageSmoothingEnabled = true;
    ctx.globalCompositeOperation = 'source-over';

    // --- 1-bit Bayer dither — final pass, threshold to pure B&W.
    // pattern offset shifts continuously, accelerating with treble.
    applyDither(Math.floor(ditherPhaseX), Math.floor(ditherPhaseY));

    // --- color overlay: tint the dithered B&W to the active palette color,
    // then invert color inside each slice-bar footprint (tint → complement,
    // black → white). Done after dither so the tint operates on pure B&W.
    // Skipped on monochrome freeze frames so the freeze reads as a B&W beat.
    const tintActive = !(freezeFrames > 0 && freezeMono);
    if (tintActive) {
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = `rgb(${tintR | 0},${tintG | 0},${tintB | 0})`;
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'source-over';
      // mono bars: repaint the pre-tint B&W (still in ditherCanvas) inside
      // each region, clipped to the rotated rect. Punches a colorless slot
      // through the tinted field.
      if (monoRegions.length) {
        const dw = ditherCanvas.width;
        const dh = ditherCanvas.height;
        for (let i = 0; i < monoRegions.length; i++) {
          const r = monoRegions[i];
          ctx.save();
          if (r.angle) {
            ctx.translate(W * 0.5, H * 0.5);
            ctx.rotate(r.angle);
            ctx.translate(-W * 0.5, -H * 0.5);
          }
          ctx.beginPath();
          ctx.rect(r.x, r.y, r.w, r.h);
          ctx.clip();
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(ditherCanvas, 0, 0, dw, dh, 0, 0, W, H);
          ctx.imageSmoothingEnabled = true;
          ctx.restore();
        }
      }
    }
    if (inversionRegions.length) {
      ctx.globalCompositeOperation = 'difference';
      ctx.fillStyle = '#fff';
      for (let i = 0; i < inversionRegions.length; i++) {
        const r = inversionRegions[i];
        if (r.angle) {
          ctx.save();
          ctx.translate(W * 0.5, H * 0.5);
          ctx.rotate(r.angle);
          ctx.translate(-W * 0.5, -H * 0.5);
          ctx.fillRect(r.x, r.y, r.w, r.h);
          ctx.restore();
        } else {
          ctx.fillRect(r.x, r.y, r.w, r.h);
        }
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    // --- single-frame flash effect after dither.
    // 'strobe' = full white frame. 'invert' = composite difference flip.
    if (pendingFlash) {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      if (pendingFlash === 'strobe') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'white';
      } else {
        ctx.globalCompositeOperation = 'difference';
        ctx.fillStyle = 'white';
      }
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      pendingFlash = null;
    }

    updateDebug(b, bassDev);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
