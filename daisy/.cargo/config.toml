# Linker flags + runner for the Daisy target.
# These only activate when something is built for thumbv7em-none-eabihf
# (i.e. the firmware crate), so they're safe to leave at workspace scope —
# host builds for the Mac triple and ignores this block entirely.
[target.thumbv7em-none-eabihf]
runner = 'probe-rs run --chip STM32H750IBKx'
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tdefmt.x",
]

# Affects defmt-rtt only (defmt is firmware-only); host ignores this var.
[env]
DEFMT_LOG = "debug"

# Workspace-scoped aliases so firmware commands work from the root.
# `cargo run -p host` for Mac dev — no alias needed; native target is default.
#
# The debug aliases (firmware/flash/bin, default features → `debug-uart`)
# override opt-level to 'z' via --config: size-first keeps `debug-uart + bell`
# under the H750's 128 KB internal-flash ceiling (~127 KB at 'z' vs an overflow
# at the profile default 's'). The PRODUCTION aliases below (flash-prod/bin-prod)
# deliberately omit this, so the shipping image keeps the profile's 's'. This is
# a TEMPORARY workaround — drop the --config once QSPI lifts the flash limit (see
# PLAN_QSPI_BOOTLOADER.md). Caveat: 'z' can slow hot DSP loops; watch
# CB_FULL_US / SAI_ERR on hardware.
[alias]
firmware = ["build", "-p", "firmware", "--target", "thumbv7em-none-eabihf", "--release", "--config", "profile.release.opt-level=\"z\""]
flash    = ["run",   "-p", "firmware", "--target", "thumbv7em-none-eabihf", "--release", "--config", "profile.release.opt-level=\"z\""]
# `cargo bin` produces target/firmware.bin for DFU flashing.
# Requires `cargo install cargo-binutils` once.
bin = ["objcopy", "-p", "firmware", "--target", "thumbv7em-none-eabihf", "--release", "--config", "profile.release.opt-level=\"z\"", "--", "-O", "binary", "target/firmware.bin"]

# --- Production build ----------------------------------------------------
# `--no-default-features` drops the `debug-uart` feature: no USART3 boot log,
# health heartbeat, chip-temperature readout, or panic print — the shipping
# kiosk firmware carries zero debug UART traffic. `--features bell` adds the
# entry chime (the exhibit needs it). Use these instead of the plain
# `flash` / `bin` aliases when building the exhibit image.
#
# INVARIANT: flash-prod and bin-prod MUST stay in parity — same crate, target,
# profile, and feature flags. They differ ONLY in the action (probe-flash vs
# emit a .bin); both produce the identical shipping image. If you change the
# feature set or flags on one, change the other in the same edit.
flash-prod = "run -p firmware --target thumbv7em-none-eabihf --release --no-default-features --features bell"
bin-prod = "objcopy -p firmware --target thumbv7em-none-eabihf --release --no-default-features --features bell -- -O binary target/firmware-prod.bin"
